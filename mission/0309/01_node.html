<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>기존 내용</h2>

    <script>
        function btn() {
            const div = document.createElement('div');
            const text = document.createTextNode('안녕하세요! createElement로 만든 요소입니다. 이 텍스트는 span입니다.');

            div.appendChild(text);

            document.body.appendChild(div);
        }
    </script>

    <button onclick="btn();">요소 생성하기</button>
</body>
</html>
