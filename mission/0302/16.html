<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .frame {
            width: 336px;
            height: 148px;
            border: 1px solid #C2C2C2;
            border-radius: 8px;
            background: #FFFFFF;
            box-sizing: border-box;

            position: absolute;
            top: 16px;
            left: 16px;

            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 8px;

            align-items: center;
        }

        .comfy {
            width: 288px;
            height: 19px;

            font-weight: 400;
            font-size: 16px;
        }

        .comfy, .login, .id, .pwd, .new {
            display: flex;
            align-items: center;
        }

        .button {
            width: 288px;
            height: 48px;
            border-radius: 8px;

            background: #17B75E;
        }

        .login {
            width: 56px;
            height: 24px;

            font-weight: 700;
            font-size: 20px;
            color: #FFFFFF;

            position: absolute;
            padding-top: 12px;
            padding-left: 116px;
        }

        .box {
            display: flex;
            flex-direction: row;

            gap: 8px;
        }

        .id, .pwd, .new {
            height: 17px;
            font-weight: 400;
            font-size: 14px;
        }

        .id {
            width: 69px;
        }

        .pwd {
            width: 82px;
        }

        .new {
            width: 52px;
        }

        .line1, .line2 {
            height: 16px;
            width: 0px;
            border: 1px solid #D3D5D7;
        }
    </style>
    
    <div class="frame">
        <div class="comfy">사이트를 더 안전하고 편리하게 이용하세요. </div>
        <div class="button">
            <div class="login">로그인</div>
        </div>
        <div class="box">
            <div class="id">아이디 찾기</div>
            <div class="line1"></div>
            <div class="pwd">비밀번호 찾기</div>
            <div class="line2"></div>
            <div class="new">회원가입</div>
        </div>
    </div>
</body>
</html>
