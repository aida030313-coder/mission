<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .pink {
            width: 120px;
            height: 170px;
            border-radius: 8px;
            background: #FFB9B9;

            top: 16px;
            left: 16px;
            position: relative;
        }

        .circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #D9D9D9;

            top: 138px;
            left: 88px;
            position: absolute;
        }

        .text {
            font-weight: 400;
            font-size: 12px;

            width: 104px;
            height: 30px;
            top: 194px;
            left: 24px;
            position: absolute;
        }
    </style>
    <div class="pink">
        <div class="circle"></div>
    </div>
    <div class="text">나른한 점심시간, 밖에서 밥먹기</div>
</body>
</html>
