<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .pink {
            width: 250px;
            height: 150px;
            background: #FFB9B9;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .white {
            width: 250px;
            height: 75px;
            border: 1px solid #FFB9B9;
            box-sizing: border-box;
            padding-top: 6px;
            padding-bottom: 6px;
            padding-left: 8px;
        }

        .text, .name {
            font-weight: 400;
            font-size: 12px;
        }
        
        .profile {
            width: 66px;
            height: 40px;
            padding-top: 8px;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #D9D9D9;
        }

        .name {
            width: 34px;
            height: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

    <div class="home">
        <div class="pink"></div>
        <div class="white">
            <div class="text">안녕하세요. 텍스트입니다. </div>
            <div class="profile">
                <div class="circle"></div>
                <div class="name">휴양죠</div>
            </div>
        </div>
    </div>
</body>
</html>
