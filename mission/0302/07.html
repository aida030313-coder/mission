<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .home {
            width: 278px;
            height: 160px;
            top: 16px;
            width: 16px;
        }

        .img {
            width: 278px;
            height: 120px;
            top: 16px;
            left: 16px;

            background-image: url('assets/img.jpg');
            background-position: -20px -89px;
            background-size: 278px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }


        .box {
            width: 278px;
            height: 40px;
            top: 120px;
            background: #CA785C;

            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .text {
            font-weight: 700;
            font-size: 16px;
            color: #FFFFFF;
            padding-left: 16px;
            padding-top: 10px;
        }
    </style>

    <div class="home">
        <div class="img"></div>
        <div class="box">
            <div class="text">안녕하세요!</div>
    </div>
</body>
</html>
