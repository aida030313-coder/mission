<head>

<body>
     <style>
        .box {
            width: 320px;
            height: 80px;
            top: 16px;
            left: 16px;

            display: flex;
            align-items: center;     /* 세로 방향 정중앙 정렬 */
        }

        .text {
            font-weight: 700;
            font-size: 24px;
            color: #FFFFFF;
            text-align: center;
            padding: 8px;
        }
    </style>

    <div class="box">
        <div class="text">봄</div>
        <div class="text">여름</div>
        <div class="text">가을</div>
        <div class="text">겨울</div>
    </div>
