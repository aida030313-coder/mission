<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .picture {
            width: 160px;
            height: 172px;
            background-image: url(assets/08_img.jpg);

            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            background-position: -221px -471px;

            top: 16px;
            left: 16px;
        }

        .box {
            width: 160px;
            height: 240px;
            background: #CA785C;
            border-radius: 8px;
        }

        .text1 {
            font-weight: 700;
            font-size: 16px;
            padding: 8px;
            color: #FFFFFF;
        }

        .text2, .text3 {
            font-weight: 700;
            font-size: 14px;
            padding-bottom: 8px;
            color: #FFFFFF;
        }

        .text2 {
            padding-left: 8px;
        }

        .text3 {
            text-align: left;
            padding-right: 8px;
        }
    </style>

    <div class="home">
        <div class="picture"></div>
        <div class="box">
            <div class="text1">인테리어란?</div>
            <div class="text2">김작가</div>
            <div class="text3">2024.01.01</div>
        </div>
    </div>
</body>
</html>
